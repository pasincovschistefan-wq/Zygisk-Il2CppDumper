name: Build Zygisk Module

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Game package name'
        required: true
        default: 'com.example.game'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          export ANDROID_NDK_HOME=$PWD/android-ndk-r25c
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh ${{ github.event.inputs.package }}

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: Zygisk-Il2CppDumper
          path: Zygisk-Il2CppDumper.zip