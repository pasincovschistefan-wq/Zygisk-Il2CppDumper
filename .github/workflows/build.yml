name: Build Zygisk Module

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Game package name'
        required: true
        default: 'com.example.game'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_HOME: ${{ github.workspace }}/android-ndk-r25c
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup NDK and CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip cmake build-essential
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=${{ github.workspace }}/android-ndk-r25c" >> $GITHUB_ENV

      - name: Verify NDK
        run: |
          echo "NDK path: $ANDROID_NDK_HOME"
          ls -la $ANDROID_NDK_HOME/build/cmake/android.cmake

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh ${{ github.event.inputs.package }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Zygisk-Il2CppDumper
          path: Zygisk-Il2CppDumper.zip
